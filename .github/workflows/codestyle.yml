name: Python Style Checker

on: [ push, pull_request, workflow_dispatch ]

jobs:
  flake8:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - name: Check out source repository
        uses: actions/checkout@v3

      - name: Run linter
        uses: astral-sh/ruff-action@v3

      - name: Check styling
        run: ruff format --check --diff
